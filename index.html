<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>MyStats — Personal PT</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <header id="app-header">
    <div class="header-inner">
      <h1 id="header-title">MyStats</h1>
      <span class="header-sub">Personal PT</span>
    </div>
  </header>

  <main id="content" class="content">
    <div class="loading">Initialising...</div>
  </main>

  <nav id="main-nav" class="bottom-nav"></nav>

  <script type="module" src="/js/app.js"></script>

  <script>
    // If modules fail to load or SW is stale, show recovery after 5s
    setTimeout(function() {
      var el = document.getElementById('content');
      if (el && el.innerText.trim() === 'Initialising...') {
        el.innerHTML = '<div style="padding:2rem 1.5rem;text-align:center">'
          + '<p style="color:#ff6b6b;margin-bottom:.5rem;font-weight:600">Stuck loading</p>'
          + '<p style="color:#7070a0;font-size:.9rem;margin-bottom:1.5rem">Your cached version is outdated. Tap below to clear it and reload.</p>'
          + '<button onclick="hardReset()" style="background:#6c63ff;color:#fff;border:none;padding:.8rem 2rem;border-radius:10px;font-size:1rem;cursor:pointer;font-weight:600">Clear Cache &amp; Reload</button>'
          + '</div>';
      }
    }, 5000);

    async function hardReset() {
      try {
        if ('serviceWorker' in navigator) {
          var regs = await navigator.serviceWorker.getRegistrations();
          for (var r of regs) await r.unregister();
        }
        if ('caches' in window) {
          var keys = await caches.keys();
          for (var k of keys) await caches.delete(k);
        }
      } catch(e) {}
      location.reload(true);
    }
  </script>
</body>
</html>
